<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Earthen dark background -->
  <rect width="32" height="32" rx="5" fill="#16150f"/>
  <!-- Ouroboros ring — broken circle with gap at top suggesting the snake eating its tail -->
  <circle
    cx="16" cy="16" r="10"
    fill="none"
    stroke="#8a9a63"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-dasharray="50 13"
    transform="rotate(-90 16 16)"
  />
</svg>
